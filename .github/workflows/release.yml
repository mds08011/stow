name: Build and Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Tag (e.g., v1.5)'
        required: true
        default: 'v1.5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with Version Tag
        run: |
          mkdir -p restored-artifacts
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/stow-app-${{ github.event.inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.version }}
          files: app/build/outputs/apk/debug/stow-app-${{ github.event.inputs.version }}.apk
